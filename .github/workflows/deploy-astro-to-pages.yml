# Build the Astro site (with typst-rendered CV PDFs co-located under /files/)
# and publish to GitHub Pages.
name: Deploy Astro site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "22"
      # PDFs land in astro/public/files/ so astro build copies them into dist/files/.
      PDF_DIR: astro/public/files
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: astro/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install Astro dependencies
        working-directory: astro
        run: npm ci

      - name: Install typst
        uses: typst-community/setup-typst@v3

      - name: Install Inter font for typst
        run: make install-fonts

      - name: Build CV PDFs with typst
        run: make pdf PDF_DIR=${{ env.PDF_DIR }}

      - name: Build Astro site
        working-directory: astro
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
